services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-subsidyai}
      POSTGRES_USER: ${DB_USER:-subsidyai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-subsidyai}

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput 2>/dev/null;
             python manage.py train_model 2>/dev/null || true;
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ml_models:/app/apps/scoring/ml_models
    ports:
      - "8080:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  static_files:
  media_files:
  ml_models:
